services:
  # --- BASES DE DONNÉES ---
  postgres-db:
    image: postgres:16-alpine
    container_name: althea-postgres
    environment:
      POSTGRES_USER: althea_user
      POSTGRES_PASSWORD: althea_password
      POSTGRES_DB: althea_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mongodb:
    image: mongo:7.0
    container_name: althea-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_password
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  # --- MICROSERVICES NODE.JS ---
  auth-cart-service:
    build: ./auth-cart-service
    container_name: althea-auth-cart
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://althea_user:althea_password@postgres-db:5432/althea_prod?schema=public
      - JWT_SECRET=VotreCleSecreteIci
    depends_on:
      - postgres-db

  support-service:
    build:
      context: .
      dockerfile: support-service/Dockerfile
    container_name: althea-support
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - DATABASE_URL=postgresql://althea_user:althea_password@postgres-db:5432/althea_prod?schema=public
    depends_on:
      - postgres-db

  # --- MICROSERVICES JAVA (SPRING BOOT) ---
  admin-service:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: althea-admin
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/althea_prod
      - SPRING_DATASOURCE_USERNAME=althea_user
      - SPRING_DATASOURCE_PASSWORD=althea_password
      - SPRING_DATA_MONGODB_URI=mongodb://admin:admin_password@mongodb:27017/admin_db?authSource=admin
    depends_on:
      - postgres-db
      - mongodb

  catalog-service:
    build:
      context: .
      dockerfile: Dockerfile.catalog
    container_name: althea-catalog
    ports:
      - "8082:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/althea_prod
      - SPRING_DATASOURCE_USERNAME=althea_user
      - SPRING_DATASOURCE_PASSWORD=althea_password
      - SPRING_DATA_MONGODB_URI=mongodb://admin:admin_password@mongodb:27017/catalog_db?authSource=admin
    depends_on:
      - postgres-db
      - mongodb

  # --- FRONT-END NEXT.JS ---
  front-end:
    build:
      context: ./front_altheas_systems-main
      args:
        - NEXT_PUBLIC_API_AUTH=http://localhost:5000
        - NEXT_PUBLIC_API_SUPPORT=http://localhost:5001
        - NEXT_PUBLIC_API_CATALOG=http://localhost:8082
        - NEXT_PUBLIC_API_ADMIN=http://localhost:8081
    container_name: front-althea
    ports:
      - "3000:3000"
    depends_on:
      - auth-cart-service
      - support-service
      - catalog-service
      - admin-service

volumes:
  postgres_data:
  mongo_data:
