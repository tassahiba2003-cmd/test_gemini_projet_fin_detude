spring.application.name=Product & CMS/ Home Service

# Fichier optionnel (non versionné) : src/main/resources/application-local.properties
spring.config.import=optional:classpath:application-local.properties

# ===============================
# Serveur
# ===============================
server.port=8082

# ===============================
# PostgreSQL
# ===============================
spring.datasource.url=jdbc:postgresql://ep-misty-unit-abtij7a8-pooler.eu-west-2.aws.neon.tech:5432/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_zH4xRhq2UPZp
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
# Colonnes snake_case (aligné avec Prisma : full_name, user_id, etc.)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ===============================
# MongoDB (Atlas : définir MONGODB_URI ou application-local.properties)
# ===============================
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/althea_systems_db}
spring.data.mongodb.uri=${spring.mongodb.uri}

# ===============================
# Logging
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE